name: Build & Release APK

on:
  push:
    tags:
      - "v*"          # Dispara en tags como v0.3.0, v1.0.0
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub
    inputs:
      release_type:
        description: "Tipo de release"
        required: true
        default: "beta"
        type: choice
        options: [beta, release]

# Permisos para crear releases y subir assets
permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Para calcular el changelog

      # ── Java 17 ─────────────────────────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # ── Gradle cache ─────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # ── Permisos de gradlew ──────────────────────────────────────────────────
      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      # ── Keystore desde secrets ───────────────────────────────────────────────
      # Si no hay keystore configurado, compila un APK debug (sin firmar).
      # Para release firmado, agregar los secrets en GitHub.
      - name: Configurar keystore (si existe)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          echo "KEYSTORE_CONFIGURED=true" >> $GITHUB_ENV

      # ── Build debug (siempre) ────────────────────────────────────────────────
      - name: Build APK Debug
        run: ./gradlew assembleDebug --no-daemon

      # ── Build release (solo si hay keystore) ────────────────────────────────
      - name: Build APK Release (firmado)
        if: ${{ env.KEYSTORE_CONFIGURED == 'true' }}
        env:
          SIGNING_KEY_ALIAS:    ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      # ── Renombrar APKs ───────────────────────────────────────────────────────
      - name: Renombrar APKs
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ]; then VERSION="manual-$(date +%Y%m%d)"; fi

          DEBUG_APK="app/build/outputs/apk/debug/app-debug.apk"
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"

          mkdir -p dist

          if [ -f "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" "dist/ytmusicdl-${VERSION}-debug.apk"
            echo "DEBUG_APK_PATH=dist/ytmusicdl-${VERSION}-debug.apk" >> $GITHUB_ENV
          fi

          if [ -f "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" "dist/ytmusicdl-${VERSION}-release.apk"
            echo "RELEASE_APK_PATH=dist/ytmusicdl-${VERSION}-release.apk" >> $GITHUB_ENV
          fi

          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      # ── Subir APK como artifact (siempre disponible) ─────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ env.VERSION }}
          path: dist/*.apk
          retention-days: 30

      # ── Generar changelog desde commits ──────────────────────────────────────
      - name: Generar changelog
        id: changelog
        run: |
          # Commits desde el tag anterior
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges -20)
          fi

          # Escapar para multiline en GitHub Actions
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG"           >> $GITHUB_OUTPUT
          echo "EOF"            >> $GITHUB_OUTPUT

      # ── Crear GitHub Release (solo en tags) ──────────────────────────────────
      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "ytmusicdl ${{ env.VERSION }}"
          body: |
            ## 🎵 ytmusicdl ${{ env.VERSION }}

            ### Instalación
            1. Descarga el APK
            2. Habilita "Instalar de fuentes desconocidas" en Android
            3. Instala el APK
            4. Asegúrate de tener Termux instalado con ytmusicdl configurado

            > **Requisito**: Termux con `allow-external-apps = true` en `~/.termux/termux.properties`

            ### Cambios
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### APKs
            - `*-debug.apk` — para pruebas, no requiere keystore
            - `*-release.apk` — firmado, para distribución (si se configuró keystore)
          files: dist/*.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: false
