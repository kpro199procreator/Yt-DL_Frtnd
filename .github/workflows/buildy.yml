name: Build & Release APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}

      - run: chmod +x gradlew

      - name: Keystore setup
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          echo "HAS_KEYSTORE=true" >> $GITHUB_ENV

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS:      ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APKs
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          mkdir -p dist
          [ -f app/build/outputs/apk/debug/app-debug.apk ] && \
            cp app/build/outputs/apk/debug/app-debug.apk \
               dist/ytmusicdl-standalone-${VERSION}-debug.apk
          [ -f app/build/outputs/apk/release/app-release.apk ] && \
            cp app/build/outputs/apk/release/app-release.apk \
               dist/ytmusicdl-standalone-${VERSION}-release.apk
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ env.VERSION }}
          path: dist/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "ytmusicdl standalone ${{ env.VERSION }}"
          body: |
            ## 🎵 ytmusicdl standalone ${{ env.VERSION }}

            App completamente independiente — sin Termux, sin Python.

            ### Stack
            - **NewPipe Extractor** — búsqueda y extracción de streams YT Music
            - **ffmpeg-kit** — conversión de audio
            - **JAudioTagger** — metadata ID3/MP4
            - **lrclib** — letras sincronizadas LRC

            ### Instalación
            1. Descarga el APK
            2. Activa "Instalar de fuentes desconocidas"
            3. Instala y abre
          files: dist/*.apk
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
